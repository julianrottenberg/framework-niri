name: Build Custom Image
on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build Image
        uses: blue-build/github-action@v1.0.0
        with:
          recipe: recipes/${{ matrix.recipe }}
          registry: ghcr.io
          registry_namespace: ${{ github.repository_owner }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          flatten_panels: true
