name: Build ISO
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (default: latest)'
        required: false
        default: 'latest'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container:
      image: fedora:latest
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            curl \
            podman \
            skopeo \
            xorriso \
            grub2-tools \
            grub2-tools-extra \
            isomd5sum

      - name: Build ISO
        uses: JasonN3/build-container-installer@v1.4.0
        with:
          arch: x86_64
          image_name: framework-niri
          image_repo: ghcr.io/julianrottenberg
          image_tag: ${{ github.event.inputs.version || 'latest' }}
          version: 43
          variant: base
          iso_name: framework-niri-${{ github.event.inputs.version || 'latest' }}.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: framework-niri-iso
          path: |
            *.iso
            *-CHECKSUM
          retention-days: 7

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.iso
            *-CHECKSUM
          tag_name: iso-${{ github.run_number }}
          name: Framework Niri ISO ${{ github.event.inputs.version || 'latest' }}
          body: |
            Bootable ISO for Framework Niri (${{ github.event.inputs.version || 'latest' }})
            
            ## Installation
            1. Flash ISO to USB using Fedora Media Writer or balenaEtcher
            2. Boot from USB
            3. Follow Anaconda installer
            4. System will be installed with Framework Niri image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
