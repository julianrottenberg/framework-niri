# Foot terminal configuration - Catppuccin Macchiato theme

[main]
font=Fira Code:style=Regular:size=11, monospace:size=11
font-bold=Fira Code:style=Bold:size=11
font-italic=Fira Code:style=Italic:size=11
font-bold-italic=Fira Code:style=Bold Italic:size=11

pad=4x4
dpi-aware=no
box-drawings-uses-font-glyphs=no
initial-window-size-chars=100x30

[csd]
preferred=none

[scrollback]
lines=100000
multiplier=3.0

[cursor]
style=block
blink=yes
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[colors]
alpha=0.9

background=24273a
foreground=cad3f5

cursor=24273a 5b6078

selection-background=363a4f
selection-foreground=cad3f5

regular0=494d64
regular1=c21f30
regular2=a6da95
regular3=eed49f
regular4=8aadf4
regular5=8b4567
regular6=8bd5ca
regular7=b8c0e0

bright0=5b6078
bright1=d13e3e
bright2=a6da95
bright3=eed49f
bright4=8aadf4
bright5=a675a6
bright6=91d7e3
bright7=a5adcb

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
primary-paste=Shift+Insert
search-start=Control+Shift+f
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+n

[search-bindings]
cancel=Escape Control+g
commit=Return
find-prev=Control+p Up
find-next=Control+n Down

[tweak]
font-monospace-warn=no
