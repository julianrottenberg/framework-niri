# NetworkManager configuration for Framework 13 AMD
# Use iwd backend for better MT7925 Wi-Fi support

[main]
# plugins=ifcfg-rh

[device]
wifi.backend=iwd

[connection]
# Enable IPv6
ipv6.ip6-privacy=2

# Better Wi-Fi roaming
[connection-wifi]
# Enable Wi-Fi power save (can help battery on Framework)
wifi.powersave=2
