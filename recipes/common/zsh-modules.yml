modules:
  - type: rpm-ostree
    install:
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting

  - type: script
    scripts:
      - install-prezto.sh

  - type: files
    files:
      - source: system/zsh
        destination: /

  - type: script
    snippets:
      - chsh -s /usr/bin/zsh root || true
