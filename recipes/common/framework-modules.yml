modules:
  - type: rpm-ostree
    install:
      - linux-firmware
      - power-profiles-daemon
      - fprintd
      - fprintd-pam
      - iwd
      - iio-sensor-proxy
      - fwupd

  - type: files
    files:
      - source: system/framework
        destination: /

  - type: systemd
    system:
      enabled:
        - power-profiles-daemon.service
        - fprintd.service
        - iio-sensor-proxy.service
